name: Pipeline de CI/CD - Meu Primeiro Robô

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  verificacoes-basicas:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verificar estrutura
        run: ls -la

      - name: Executar aplicação
        run: node app.js

      - name: Mensagem sucesso
        run: echo "Pipeline executado com sucesso!"
